<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <!--Unorder List-->
    <!--เหมาะสำหรับใช้จัดกลุ่มข้อความที่เป็นรายการที่สลับหน้าหลังได้-->
    <!--เช่นรายการสินค้า สิ่งที่ต้องทำ-->
    <ul>
        <!--List Item-->
        <li>Coffee</li>
        <li>Tea</li>
        <li>Milk</li>
    </ul>

    <br>

    <!--Order List(จุดไข่ปลา)--> 
    <ol>
        <li>First</li>
        <li>Second</li>
        <li>Third</li>
    </ol>


</body>
</html>
