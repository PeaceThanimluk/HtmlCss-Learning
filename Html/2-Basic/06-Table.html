<body>
    <table>

        <!--TableRow แถวของตารางแนวนอน-->
        <!--แถวที่1-->
        <tr>
            <!--TableHeader หัวข้อคอลัม-->
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <!--แถวที่2-->
        <tr>
            <!--ช่องใส่ข้อมูลทั่วไปในตาราง-->
            <td>01</td> <!--Id-->
            <td>peace</td> <!--Name-->
            <td>18</td> <!--Age-->
        </tr>
        <!--แถวที่3-->
        <tr>
            <!--ช่องใส่ข้อมูลทั่วไปในตาราง-->
            <td>02</td> <!--Id-->
            <td>Hee</td> <!--Name-->
            <td>120</td> <!--Age-->
        </tr>
        <!--แถวที่4-->
        <tr>
            <!--ช่องใส่ข้อมูลทั่วไปในตาราง-->
            <td>03</td> <!--Id-->
            <td>Kuy</td> <!--Name-->
            <td>18</td> <!--Age-->
        </tr>

    </table>
</body>

<!--
1.Create table tag
2.Tr create row(horizontal)
3.th create table header(หัวข้อ)
4.td ใส่ข้อมูลตาราง
-->
