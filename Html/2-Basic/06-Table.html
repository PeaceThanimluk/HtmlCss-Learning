<body>
    <table>

        <!--TableRow แถวของตารางแนวนอน-->
        <!--แถวที่1-->
        <tr>
            <!--TableHeader หัวข้อคอลัม-->
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <!--แถวที่2-->
        <tr>
            <!--ช่องใส่ข้อมูลทั่วไปในตาราง-->
            <td>01</td> <!--Id-->
            <td>peace</td> <!--Name-->
            <td>18</td> <!--Age-->
        </tr>
        <!--แถวที่3-->
        <tr>
            <!--ช่องใส่ข้อมูลทั่วไปในตาราง-->
            <td>02</td> <!--Id-->
            <td>Hee</td> <!--Name-->
            <td>120</td> <!--Age-->
        </tr>
        <!--แถวที่4-->
        <tr>
            <!--ช่องใส่ข้อมูลทั่วไปในตาราง-->
            <td>03</td> <!--Id-->
            <td>Kuy</td> <!--Name-->
            <td>18</td> <!--Age-->
        </tr>

    </table>
</body>

<!--
1.Create table tag
2.Tr create row(horizontal)
3.th create table header(หัวข้อ)
4.td ใส่ข้อมูลตาราง
-->


<br>
<br>

<table>
    <!--1.ส่วนหัวของตาราง-->
    <thead>
        <tr>
            <th>Name</th>
            <th>Price</th>
        </tr>
    </thead>
    <!--2.ส่วนเนื้อหาของตาราง-->
    <tbody>
        <tr>
            <td>Milk Tea</td>
            <td>45 bath</td>
        </tr>
        <tr>
            <td>Coffee</td>
            <td>30 bath</td>
        </tr>
    </tbody>

    <!--3.ส่วนของท้ายตาราง(ถ้ามี)-->
    <tfoot>
        <tr>
            <td>Amount</td>
            <td>75 Bath</td>
        </tr>
    </tfoot>
</table>

<!--
ทำไมเราควรแยก <thead> และ <tbody>? (ทำไมไม่ใช้ <tr> ยาว ๆ ไปเลย?)

    -ง่ายต่อการแต่งหน้าตา (CSS): คุณสามารถสั่งเปลี่ยนสีพื้นหลังของ <thead> ทั้งหมดให้เป็นสีดำตัวอักษรขาวได้ง่าย ๆ ในบรรทัดเดียว โดยไม่ต้องไปสั่งเปลี่ยนทีละแถว

    -ดีต่อระบบค้นหา (SEO) และเครื่องอ่านหน้าจอ: บอทของ Google หรือเครื่องช่วยอ่านของคนตาบอดจะเข้าใจทันทีว่า แถวไหนคือหัวข้อ และแถวไหนคือข้อมูลจริง ๆ

-->
