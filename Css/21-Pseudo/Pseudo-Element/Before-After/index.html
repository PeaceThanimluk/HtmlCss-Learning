<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article class="Before-After">
        <h1>Before After</h1>
        <article class="Before">
            <h2>Before</h2>
            <div class="box">
                <p>
                    ::before เป็นการเติมcontentเข้าไปที่ตัวแรกของบรรทัด ตัวอย่าง เพิ่มอิโมจิหน้าข้อความ
                </p>
                <span class="emoji-before">ยิ้ม</span>
            </div>
        </article>
        <article class="After">
            <h2>After</h2>
            <div class="box">
                <p>
                    ::after เป็นการเติมcontentเข้าไปที่ตัวหลังของบรรทัด
                </p>
                <span class="emoji-after">ยิ้ม</span>                
            </div>
        </article>
    </article>
</body>
</html>
